<!DOCTYPE html>
<html>
<head>
    <title>Custom Digital Art Commissions</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f2f2f2;
            margin: 0;
        }

        .container {
            width: 90%;
            max-width: 1000px;
            margin: 30px auto;
            background: white;
            border: 2px solid black;
        }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            padding: 15px 20px;
            border-bottom: 2px solid black;
        }

        .nav a {
            text-decoration: none;
            margin-left: 20px;
            color: black;
            font-weight: bold;
        }

        /* Hero Section */
        .hero {
            text-align: center;
            padding: 40px 20px;
            border-bottom: 2px solid black;
        }

        .hero h1 {
            margin-bottom: 20px;
        }

        .hero button {
            padding: 10px 20px;
            margin: 10px;
            border: 2px solid black;
            background: white;
            cursor: pointer;
            font-weight: bold;
        }

        /* Section Titles */
        .section-title {
            text-align: center;
            margin: 20px 0;
            font-weight: bold;
        }

        hr {
            border: 1px solid black;
            width: 80%;
        }

        /* Gallery */
        .gallery {
            display: flex;
            justify-content: space-around;
            padding: 20px;
        }

        .art-box {
            width: 150px;
            height: 100px;
            border: 2px solid black;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }

        /* Pricing */
        .pricing {
            display: flex;
            justify-content: space-around;
            padding: 20px;
        }

        .price-box {
            width: 180px;
            border: 2px solid black;
            padding: 15px;
            text-align: center;
        }

        .price-box button {
            margin-top: 10px;
            padding: 5px 15px;
            border: 2px solid black;
            background: white;
            cursor: pointer;
            font-weight: bold;
        }

        /* How It Works */
        .how {
            text-align: center;
            padding: 20px;
        }

        /* Footer */
        .footer {
            display: flex;
            justify-content: flex-end;
            padding: 15px 20px;
            border-top: 2px solid black;
        }

        @media (max-width: 768px) {
            .gallery, .pricing {
                flex-direction: column;
                align-items: center;
                gap: 15px;
            }
        }

    </style>
</head>

<body>

<div class="container">

    <!-- Header -->
    <div class="header">
        <div><strong>LOGO</strong></div>
        <div class="nav">
            <a href="#">Home</a>
            <a href="#">Portfolio</a>
            <a href="#">Order</a>
        </div>
    </div>

    <!-- Hero Section -->
    <div class="hero">
        <h1>Custom Digital Art Commissions</h1>
        <button>View Portfolio</button>
        <button>Order Now</button>
    </div>

    <!-- Gallery -->
    <hr>
    <div class="section-title">Gallery</div>
    <div class="gallery">
        <div class="art-box">Art 1</div>
        <div class="art-box">Art 2</div>
        <div class="art-box">Art 3</div>
        <div class="art-box">Art 4</div>
    </div>

    <!-- Pricing -->
    <hr>
    <div class="section-title">Pricing</div>
    <div class="pricing">
        <div class="price-box">
            <strong>Basic</strong><br>
            <button>Order</button>
        </div>

        <div class="price-box">
            <strong>Standard</strong><br>
            <button>Order</button>
        </div>

        <div class="price-box">
            <strong>Premium</strong><br>
            <button>Order</button>
        </div>
    </div>

    <!-- How It Works -->
    <hr>
    <div class="section-title">How It Works</div>
    <div class="how">
        1. Submit Request &nbsp;&nbsp;&nbsp;
        2. Make Payment &nbsp;&nbsp;&nbsp;
        3. Receive Artwork
    </div>

    <!-- Footer -->
    <div class="footer">
        Contact | Terms
    </div>

</div>

</body>
</html>
